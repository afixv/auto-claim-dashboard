name: Automated Daily Claim & Update Dashboard

on:
  # schedule:
  #   - cron: '5 18 * * *' # Jam 01:05 WIB dini hari
  workflow_dispatch:     # Tombol eksekusi manual

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Wajib agar bot bisa push history.json ke repo

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Playwright & Stealth Plugin
      run: |
        npm init -y
        npm install playwright playwright-extra puppeteer-extra-plugin-stealth
        npx playwright install chromium --with-deps

    - name: Run Script
      env:
        GAME_USER: ${{ secrets.GAME_USER }}
        GAME_PASSWORD: ${{ secrets.GAME_PASSWORD }}
      run: node daily-claim.js

    - name: Commit and Push Dashboard Data
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add history.json
        git commit -m "chore: update daily claim history" || echo "No changes to commit"
        git push
